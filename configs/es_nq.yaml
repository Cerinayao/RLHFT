kdb:
  host: hfm.princeton.edu
  port: 6007
  retry_port: 6009
  retry_interval: 5

data:
  start_date: "2024-02-05"
  end_date: "2024-02-23"
  date_active: "2024.02.05"
  instruments: ["SR3"]
  preferred_symbols: ["SR3Z4", "SR3H5"]
  time_grid_q: "(0D00:00:00 + 0D00:01:00 * til 961)"
  drop_all_nan_rows: true

scaling:
  scales:
    ES: 1.0
    NQ: 1.0
    SR: 1.0
    CL: 1.0
    RB: 1.0
    HO: 1.0
  display_scales:
    ES: 100.0
    NQ: 100.0
    SR: 100.0
    CL: 100.0
    RB: 10000.0
    HO: 10000.0

signal:
  window: 60
  eps: 1.0e-8

zscore:
  z_window: 300
  z_lag: 1
  z_step: 0.5
  z_clip: 5.0

trading:
  col_a: SR3Z4
  col_b: SR3H5
  inv_limit: 2
  action_values: [-2, -1, 0, 1, 2]
  mult_a: 2500.0
  mult_b: 2500.0
  cost_per_trade: 0.0

rule:
  z_flat: 0.5
  z_entry: 1.0
  z_strong: 2.0
  inv_penalty: 0.0

qlearning:
  train_end: "2024-02-18"
  gamma: 0.99
  lr: 0.1
  epochs: 100
  eps_start: 0.5
  eps_end: 0.01
  seed: 0
  regime_window: 60
  q_decay: 0.998
  use_adaptive_lr: false
  lr_visit_scale: 0.01
  persistent_exploration: 0.02
  inv_penalty: 1.0

xgb:
  train_end: "2024-02-14"
  val_end: "2024-02-18"
  n_estimators: 500
  max_depth: 4
  learning_rate: 0.02
  subsample: 0.9
  colsample_bytree: 0.9
  reg_lambda: 5.0
  reg_alpha: 0.3
  min_child_weight: 3
  random_state: 42
  inv_penalty: 1.0

rule_extraction:
  target_fidelity: 0.9
  max_rules: 600
  candidate_top_n: 5000
  tree_top_n: 12

analysis:
  start_date: "2024-02-19"
  trading_start: "00:00"
  trading_end: "16:00"
  signal_horizons_max: 30

make_plots: true
